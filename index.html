<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Garden Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style id="dynamicStyles">
        /* الأنماط الافتراضية المبدئية */
        :root {
            --primary: #0ca143;
            --bg: #f4f7f6;
            --surface: #ffffff;
            --text: #111827;
            --radius: 16px;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; padding: 20px; text-align: center; transition: all 0.3s ease; }
        .card { background: var(--surface); padding: 15px; margin: 10px auto; max-width: 400px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .price { color: var(--primary); font-weight: 900; }
    </style>
</head>
<body>

    <h1 id="title">جاري التحميل...</h1>
    <div id="menuContainer"></div>

    <script>
        async function loadApp() {
            try {
                const [sRes, mRes] = await Promise.all([
                    fetch('./settings.json?t=' + Date.now()),
                    fetch('./menu.json?t=' + Date.now())
                ]);
                const settings = await sRes.json();
                const menu = await mRes.json();

                // 1. تطبيق ألوان وتنسيقات الذكاء الاصطناعي ديناميكياً
                if(settings.theme) {
                    const root = document.documentElement;
                    root.style.setProperty('--primary', settings.theme.primary_color || '#0ca143');
                    root.style.setProperty('--bg', settings.theme.bg_color || '#f4f7f6');
                    root.style.setProperty('--surface', settings.theme.surface_color || '#ffffff');
                    root.style.setProperty('--text', settings.theme.text_color || '#111827');
                    root.style.setProperty('--radius', settings.theme.card_radius || '16px');
                }

                document.getElementById('title').innerText = settings.store_name;
                document.getElementById('pageTitle').innerText = settings.store_name;

                // 2. عرض المحتوى
                const container = document.getElementById('menuContainer');
                container.innerHTML = '';

                (menu.categories || []).forEach(cat => {
                    container.innerHTML += `<h2 style="margin-top:25px; color:var(--primary)">📁 ${cat.name}</h2>`;
                    (cat.items || []).forEach(item => {
                        container.innerHTML += `
                            <div class="card">
                                <span>${item.name}</span>
                                <span class="price">${item.price} ${settings.currency || ''}</span>
                            </div>`;
                    });
                });
            } catch(e) { console.error("Error loading app data:", e); }
        }
        window.onload = loadApp;
    </script>
</body>
</html>
