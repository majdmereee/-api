<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الجذرية الذكية 🤖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 16px; max-width: 600px; margin: 15px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-top: 8px; font-family: 'Tajawal'; }
        button { background: #0ca143; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 900; margin-top: 10px; cursor: pointer; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
        .ai-box { background: #f0fdf4; border: 2px dashed #0ca143; }
        .preview-card { padding: 10px; border-radius: 8px; margin: 5px 0; display: flex; justify-content: space-between; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="box">
    <h2>🔑 إعدادات المفاتيح</h2>
    <label>GitHub Token (PAT):</label>
    <input type="password" id="ghToken" placeholder="ghp_...">
    
    <label style="margin-top: 10px; display:block;">Gemini API Key:</label>
    <input type="password" id="geminiKey" value="AQ.Ab8RN6KvrSGtF7wMy23vEx96RrEwEKead4Ionqv6HGIJdmVVBQ">
    
    <button onclick="saveKeys()" style="background:#111827;">حفظ المفاتيح</button>
</div>

<div class="box ai-box">
    <h2>⚡ التحكم الكلي والتعاديل الجذرية</h2>
    <p style="font-size:0.85rem; color:#555; line-height: 1.4;">اطلب تغيير المحتوى، التصميم، الألوان، أو العملة. سيتولى الذكاء الاصطناعي إعادة إعمار المنيو كاملاً حسب طلبك.</p>
    <textarea id="aiPrompt" rows="3" placeholder="مثال: غير ألوان الموقع للثيم الداكن الأسود والأصفر الذهبي وارفع أسعار كل الوجبات 1000 ليرة"></textarea>
    <button onclick="runUltimateAiEdit()" id="aiBtn">تطبيق التعديلات الجذرية 🚀</button>
</div>

<div class="box" id="previewArea" style="display:none;">
    <h2>👁️ معاينة التعديلات الجديدة قبل الحفظ</h2>
    <div id="themePreview" style="padding:10px; border-radius:12px; text-align:center; margin-bottom:15px; font-weight:bold;">
        تأثير الألوان الجديد
    </div>
    <div id="menuPreview"></div>
    <button onclick="saveAllToGitHub()" id="saveBtn" style="background:#f59e0b;">💾 اعتماد وحفظ التغييرات في GitHub</button>
</div>

<script>
    const REPO = 'USER_NAME/menu-ai-test'; // <-- استبدل USER_NAME باسم حسابك على جيثب

    let menuData = null, menuSha = null;
    let settingsData = null, settingsSha = null;

    function saveKeys() {
        localStorage.setItem('test_gh_token', document.getElementById('ghToken').value.trim());
        localStorage.setItem('test_gemini_key', document.getElementById('geminiKey').value.trim());
        alert("تم حفظ المفاتيح ✔️");
        loadDataFromGitHub();
    }

    async function loadDataFromGitHub() {
        const token = localStorage.getItem('test_gh_token');
        if(!token) return;

        try {
            const [mRes, sRes] = await Promise.all([
                fetch(`https://api.github.com/repos/${REPO}/contents/menu.json`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`https://api.github.com/repos/${REPO}/contents/settings.json`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);

            const mData = await mRes.json();
            const sData = await sRes.json();

            menuSha = mData.sha;
            settingsSha = sData.sha;

            menuData = JSON.parse(decodeURIComponent(escape(atob(mData.content))));
            settingsData = JSON.parse(decodeURIComponent(escape(atob(sData.content))));

            renderPreview();
        } catch(e) { console.error(e); }
    }

    function renderPreview() {
        if(!menuData || !settingsData) return;

        document.getElementById('previewArea').style.display = 'block';

        // معاينة الألوان
        const themeBox = document.getElementById('themePreview');
        const t = settingsData.theme || {};
        themeBox.style.backgroundColor = t.bg_color || '#f4f7f6';
        themeBox.style.color = t.text_color || '#111827';
        themeBox.style.border = `2px solid ${t.primary_color || '#0ca143'}`;
        themeBox.innerText = `اسم المطعم: ${settingsData.store_name} | اللون الرئيسي: ${t.primary_color || '#0ca143'}`;

        // معاينة القائمة
        const mBox = document.getElementById('menuPreview');
        mBox.innerHTML = '';
        (menuData.categories || []).forEach(cat => {
            mBox.innerHTML += `<h4 style="margin-top:10px; color:${t.primary_color || '#0ca143'}">📁 ${cat.name}</h4>`;
            (cat.items || []).forEach(item => {
                mBox.innerHTML += `<div class="preview-card" style="background:${t.surface_color || '#fff'}">
                    <span>${item.name}</span>
                    <b style="color:${t.primary_color || '#0ca143'}">${item.price} ${settingsData.currency || ''}</b>
                </div>`;
            });
        });
    }

    async function runUltimateAiEdit() {
        const geminiKey = document.getElementById('geminiKey').value.trim() || localStorage.getItem('test_gemini_key');
        const prompt = document.getElementById('aiPrompt').value.trim();
        const aiBtn = document.getElementById('aiBtn');

        if (!geminiKey || !prompt || !menuData || !settingsData) {
            return alert("تأكد من تحميل البيانات وإدخال المفاتيح والأمر المطلوب");
        }

        aiBtn.disabled = true;
        aiBtn.innerText = "جاري هندسة المحتوى والتصميم... ⏳";

        const systemInstruction = `أنت مهندس تصميم ومساعد إدارة مطاعم خارق.
أنت تدير ملفين: menu.json (الأقسام والمنتجات) و settings.json (اسم المطعم، العملة، وثيم الألوان theme).

يمكنك التعديل على الأسعار، إضافة أصناف، تغيير الألوان (primary_color, bg_color, surface_color, text_color)، وحجم الحواف (card_radius).

الملفات الحالية:
SETTINGS JSON:
${JSON.stringify(settingsData, null, 2)}

MENU JSON:
${JSON.stringify(menuData, null, 2)}

يجب أن ترجع النتيجة كـ JSON كائن واحد يحتوي على المفتاحين "settings" و "menu" فقط دون أي مقدمات أو شرح أو علامات markdown مثل \`\`\`json.
مثال لهيكل الإجابة المطلوب:
{
  "settings": { ... },
  "menu": { ... }
}`;

        const url = `https://generativelanguage.googleapis.com/v1beta/interactions?key=${geminiKey}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.6-flash",
                    input: `${systemInstruction}\n\nأمر المستخدم التعديلي: ${prompt}`
                })
            });

            const data = await response.json();
            
            let replyText = "";
            if (data.steps && data.steps.length > 0) {
                for (const step of data.steps) {
                    if (step.type === "model_output" && step.content) {
                        for (const item of step.content) {
                            if (item.type === "text") replyText += item.text;
                        }
                    }
                }
            }

            const cleanJsonText = replyText.replace(/```json/g, '').replace(/```/g, '').trim();
            const parsedResult = JSON.parse(cleanJsonText);

            if(parsedResult.menu && parsedResult.settings) {
                menuData = parsedResult.menu;
                settingsData = parsedResult.settings;
                renderPreview();
                alert("تم التعديل الذكي كاملاً على المحتوى والتصميم! راجع النتيجة واضغط زر الحفظ لمزامنتها.");
            } else {
                alert("تعذر استخراج البيانات بشكل دقيق، حاول صياغة الأمر بوضوح أكثر.");
            }

        } catch (err) {
            alert("حدث خطأ أثناء الاتصال بالذكاء الاصطناعي: " + err.message);
        } finally {
            aiBtn.disabled = false;
            aiBtn.innerText = "تطبيق التعديلات الجذرية 🚀";
        }
    }

    async function saveAllToGitHub() {
        const token = localStorage.getItem('test_gh_token');
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "جاري الرفع والحفظ... ⏳";

        try {
            const mContent = btoa(unescape(encodeURIComponent(JSON.stringify(menuData, null, 2))));
            const sContent = btoa(unescape(encodeURIComponent(JSON.stringify(settingsData, null, 2))));

            // رفع الملفين
            await fetch(`https://api.github.com/repos/${REPO}/contents/menu.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "AI Ultimate Menu Update", content: mContent, sha: menuSha })
            });

            await fetch(`https://api.github.com/repos/${REPO}/contents/settings.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "AI Ultimate Settings Update", content: sContent, sha: settingsSha })
            });

            alert("تم حفظ كل التعديلات (التصميم + المحتوى) ونشرها لجميع الزباين بنجاح! 🎉");
            location.reload();
        } catch (e) {
            alert("خطأ أثناء الحفظ: " + e.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "💾 اعتماد وحفظ التغييرات في GitHub";
        }
    }

    window.onload = () => {
        if(localStorage.getItem('test_gh_token')) document.getElementById('ghToken').value = localStorage.getItem('test_gh_token');
        if(localStorage.getItem('test_gemini_key')) document.getElementById('geminiKey').value = localStorage.getItem('test_gemini_key');
        loadDataFromGitHub();
    };
</script>

</body>
</html>
