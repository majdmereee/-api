<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الذكية 🤖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 16px; max-width: 600px; margin: 10px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-top: 8px; font-family: 'Tajawal'; }
        button { background: #0ca143; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 900; margin-top: 10px; cursor: pointer; }
        .ai-box { background: #e6f9ed; border: 2px dashed #0ca143; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔑 مفاتيح الربط</h2>
    <label>GitHub Token (PAT):</label>
    <input type="password" id="ghToken" placeholder="ghp_...">
    
    <label style="margin-top: 10px; display:block;">Gemini API Key:</label>
    <input type="password" id="geminiKey" value="AQ.Ab8RN6KvrSGtF7wMy23vEx96RrEwEKead4Ionqv6HGIJdmVVBQ">
    
    <button onclick="saveKeys()" style="background:#111827;">حفظ المفاتيح في المتصفح</button>
</div>

<div class="box ai-box">
    <h2>🤖 مساعد Gemini للتحكم بالمنيو</h2>
    <p style="font-size:0.85rem; color:#555;">اكتب أمرك النصي وسيقوم الذكاء الاصطناعي بتعديل المنيو تلقائياً!</p>
    <textarea id="aiPrompt" rows="2" placeholder="مثال: ارفع سعر جميع المشروبات 500 ليرة، أو أضف وجبة شاورما بسعر 4000"></textarea>
    <button onclick="runAiEdit()" id="aiBtn">تطبيق التعديل بالذكاء الاصطناعي 🚀</button>
</div>

<div class="box">
    <h2>📋 المنيو الحالي (معاينة)</h2>
    <div id="preview"></div>
    <button onclick="saveToGitHub()" id="saveBtn" style="background:#f59e0b; display:none;">💾 رفع وتطبيق التعديلات على GitHub</button>
</div>

<script>
    // تعيين المستودع الخاص بك هنا
    const REPO = 'USER_NAME/menu-ai-test'; // <-- استبدل USER_NAME باسم حسابك على جيثب

    let menuData = null;
    let menuSha = null;

    function saveKeys() {
        localStorage.setItem('test_gh_token', document.getElementById('ghToken').value.trim());
        localStorage.setItem('test_gemini_key', document.getElementById('geminiKey').value.trim());
        alert("تم حفظ المفاتيح محلياً ✔️");
        loadCurrentMenu();
    }

    // جلب المنيو من GitHub
    async function loadCurrentMenu() {
        const token = localStorage.getItem('test_gh_token');
        if(!token) return;

        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/menu.json`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        menuSha = data.sha;
        menuData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
        renderPreview();
    }

    function renderPreview() {
        const p = document.getElementById('preview');
        p.innerHTML = '';
        menuData.categories.forEach(cat => {
            p.innerHTML += `<h4>📁 ${cat.name}</h4>`;
            (cat.items || []).forEach(item => {
                p.innerHTML += `<div class="item-row"><span>${item.name}</span><b>${item.price}</b></div>`;
            });
        });
    }

    // التعديل الذكي باستخدام Gemini Interactions API
    async function runAiEdit() {
        const geminiKey = document.getElementById('geminiKey').value.trim() || localStorage.getItem('test_gemini_key');
        const prompt = document.getElementById('aiPrompt').value.trim();
        const aiBtn = document.getElementById('aiBtn');

        if (!geminiKey || !prompt || !menuData) return alert("تأكد من إدخال المفاتيح وتحميل البيانات وأمر التعديل");

        aiBtn.disabled = true;
        aiBtn.innerText = "جاري التفكير والتعديل... ⏳";

        const systemInstruction = `أنت مساعد إدارة مطاعم. وظيفتك التعديل على هيكل JSON الخاص بملف menu.json بناءً على طلب المستخدم.
يجب أن ترجع فقط نص الـ JSON الجديد المعدل بدون أي مقدمات أو شرح أو علامات markdown مثل \`\`\`json.
هذا هو هيكل المنيو الحالي:
${JSON.stringify(menuData, null, 2)}`;

        const url = `https://generativelanguage.googleapis.com/v1beta/interactions?key=${geminiKey}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.6-flash",
                    input: `${systemInstruction}\n\nطلب المستخدم: ${prompt}`
                })
            });

            const data = await response.json();
            
            let replyText = "";
            if (data.steps && data.steps.length > 0) {
                for (const step of data.steps) {
                    if (step.type === "model_output" && step.content) {
                        for (const item of step.content) {
                            if (item.type === "text") replyText += item.text;
                        }
                    }
                }
            }

            // تنظيف النص وتحويله لـ JSON
            const cleanJsonText = replyText.replace(/```json/g, '').replace(/```/g, '').trim();
            menuData = JSON.parse(cleanJsonText);

            renderPreview();
            document.getElementById('saveBtn').style.display = 'block';
            alert("تم التعديل محلياً بنجاح! راجع النتيجة واضغط زر الحفظ في الأسفل لتأكيده.");

        } catch (err) {
            alert("حدث خطأ أثناء المعالجة: " + err.message);
        } finally {
            aiBtn.disabled = false;
            aiBtn.innerText = "تطبيق التعديل بالذكاء الاصطناعي 🚀";
        }
    }

    // حفظ التعديلات ونشرها لـ GitHub
    async function saveToGitHub() {
        const token = localStorage.getItem('test_gh_token');
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "جاري الحفظ على GitHub... ⏳";

        const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(menuData, null, 2))));

        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/menu.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "AI Menu Update",
                    content: contentBase64,
                    sha: menuSha
                })
            });

            if (res.ok) {
                alert("تم تحديث موقع الزباين بنجاح! 🎉");
                location.reload();
            } else {
                alert("فشل الحفظ على GitHub");
            }
        } catch (e) {
            alert("خطأ: " + e.message);
        } finally {
            saveBtn.innerText = "💾 رفع وتطبيق التعديلات على GitHub";
        }
    }

    window.onload = () => {
        if(localStorage.getItem('test_gh_token')) document.getElementById('ghToken').value = localStorage.getItem('test_gh_token');
        if(localStorage.getItem('test_gemini_key')) document.getElementById('geminiKey').value = localStorage.getItem('test_gemini_key');
        loadCurrentMenu();
    };
</script>

</body>
</html>
